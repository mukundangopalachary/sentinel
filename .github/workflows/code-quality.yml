name: Code Quality

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Validate Maven build
        run: mvn -B -ntp verify

      - name: Run Checkstyle readability checks
        run: >
          mvn -B -ntp
          org.apache.maven.plugins:maven-checkstyle-plugin:3.4.0:check
          -Dcheckstyle.consoleOutput=true
          -Dcheckstyle.failOnViolation=true
          -Dcheckstyle.config.location=google_checks.xml
